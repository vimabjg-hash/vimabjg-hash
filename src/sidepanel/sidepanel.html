<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f111a;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
       메인 패널 (채팅 영역)
    ═══════════════════════════════════════════ */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1c2e;
      border-right: 1px solid #2d2f45;
      position: relative; /* history-drawer overlay 기준 */
    }

    /* ── 헤더 ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Aurora 로고 SVG */
    .aurora-logo-svg { flex-shrink: 0; }

    .aurora-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .model-select {
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 11px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
    }

    .model-select:hover { border-color: #4c4f6b; }

    /* ── 채팅 영역 ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 스크롤바 스타일 */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    /* ── 채팅 말풍선 ── */

    /* 사용자 말풍선 (오른쪽 정렬) */
    .bubble-user {
      display: flex;
      justify-content: flex-end;
    }

    .bubble-user .bubble-content {
      background: #2d2f45;
      color: #e2e8f0;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      max-width: 85%;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* AI 말풍선 (왼쪽 정렬) */
    .bubble-ai {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    /* AI 아바타 (퍼플→핑크 그라데이션 원형) */
    .ai-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }

    .bubble-ai .bubble-content {
      background: #141625;
      border: 1px solid #2d2f45;
      color: #d1d5db;
      border-radius: 4px 18px 18px 18px;
      padding: 12px 14px;
      max-width: calc(100% - 42px);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* 컨텍스트 뱃지 (액션 종류 + 원문 미리보기) */
    .context-badge {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-left: 3px solid #8b5cf6;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .context-badge .badge-action {
      color: #a78bfa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .context-badge .badge-text {
      color: #6c7086;
      line-height: 1.5;
    }

    /* 로딩 점 애니메이션 */
    .loading-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8b5cf6;
      margin: 0 2px;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: #a855f7; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: #ec4899; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* 빈 상태 메시지 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      color: #45475a;
      text-align: center;
      flex: 1;
    }

    .empty-state svg { opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* ── 마크다운 렌더링 스타일 (AI 말풍선 내부) ── */
    .bubble-content p { margin-bottom: 8px; line-height: 1.6; }
    .bubble-content p:last-child { margin-bottom: 0; }

    .bubble-content strong,
    .bubble-content b { font-weight: 700; color: #e2e8f0; }

    .bubble-content em,
    .bubble-content i { font-style: italic; color: #cdd6f4; }

    .bubble-content h1, .bubble-content h2, .bubble-content h3,
    .bubble-content h4, .bubble-content h5, .bubble-content h6 {
      font-weight: 700;
      color: #e2e8f0;
      margin: 10px 0 4px;
      line-height: 1.3;
    }
    .bubble-content h1 { font-size: 15px; }
    .bubble-content h2 { font-size: 14px; }
    .bubble-content h3 { font-size: 13px; }

    .bubble-content ul,
    .bubble-content ol {
      padding-left: 1.4em;
      margin: 6px 0;
    }
    .bubble-content li { margin-bottom: 4px; line-height: 1.6; }

    .bubble-content blockquote {
      border-left: 3px solid #8b5cf6;
      margin: 8px 0;
      padding: 4px 10px;
      color: #a6adc8;
      background: #0f111a;
      border-radius: 0 4px 4px 0;
    }

    /* 인라인 코드 */
    .bubble-content code {
      background: #181825;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: #cba6f7;
    }

    /* 코드 블록 */
    .bubble-content pre {
      background: #181825;
      border-radius: 8px;
      padding: 12px 14px;
      margin: 8px 0;
      overflow-x: auto;
      border: 1px solid #2d2f45;
    }
    .bubble-content pre code {
      background: transparent;
      padding: 0;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: inherit;
    }

    /* highlight.js github-dark 테마 투명화 버그 강제 차단 */
    pre code.hljs, pre code {
      color: #cdd6f4 !important;
      background: transparent !important;
      display: block;
      text-shadow: none;
    }

    .bubble-content hr {
      border: none;
      border-top: 1px solid #2d2f45;
      margin: 10px 0;
    }

    .bubble-content a {
      color: #89b4fa;
      text-decoration: underline;
    }

    .bubble-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 12px;
    }
    .bubble-content th,
    .bubble-content td {
      border: 1px solid #2d2f45;
      padding: 5px 10px;
      text-align: left;
    }
    .bubble-content th { background: #0f111a; color: #a78bfa; font-weight: 600; }

    /* ── 입력 영역 (푸터) ── */
    .input-footer {
      padding: 12px 14px;
      border-top: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-radius: 12px;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: #7c3aed; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #cdd6f4;
      font-size: 13px;
      resize: none;
      outline: none;
      height: 36px;
      max-height: 120px;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #45475a; }

    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      padding: 7px 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #2d2f45; cursor: not-allowed; }

    .input-hints {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #45475a;
    }

    .context-active {
      color: #8b5cf6;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    /* ── 페이지 컨텍스트 토글 ── */
    #page-context-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #6c7086;
      font-size: 11px;
      margin-bottom: 7px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    #page-context-toggle:hover { color: #a6adc8; }

    #page-context-toggle input[type="checkbox"] {
      accent-color: #8b5cf6;
      cursor: pointer;
      width: 12px;
      height: 12px;
    }

    #page-context-toggle.active { color: #a78bfa; }

    /* ═══════════════════════════════════════════
       슬림 사이드바 (우측 60px)
    ═══════════════════════════════════════════ */
    .slim-sidebar {
      width: 56px;
      background: #0f111a;
      border-left: 1px solid #2d2f45;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      justify-content: space-between;
    }

    .sidebar-top,
    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 0 6px;
    }

    .sidebar-sep {
      width: 32px;
      height: 1px;
      background: #2d2f45;
      margin: 8px 0;
    }

    /* 사이드바 버튼 */
    .sb-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .sb-btn:hover {
      background: #2d2f45;
      color: #cdd6f4;
    }

    .sb-btn.active {
      background: rgba(139,92,246,0.2);
      color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.3);
    }

    .sb-btn.settings:hover { transform: rotate(60deg); }

    /* ═══════════════════════════════════════════
       히스토리 뷰
    ═══════════════════════════════════════════ */
    #history-view {
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .history-count {
      font-size: 11px;
      color: #6c7086;
      margin-left: 6px;
    }

    .clear-all-btn {
      background: transparent;
      border: 1px solid #3d3f58;
      border-radius: 6px;
      color: #6c7086;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-all-btn:hover { border-color: #f38ba8; color: #f38ba8; }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    .history-card {
      background: #141625;
      border: 1px solid #2d2f45;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .history-card:hover { border-color: #4c4f6b; }

    .highlight-text {
      font-size: 13px;
      color: #cdd6f4;
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .history-date { color: #6c7086; flex-shrink: 0; }

    .history-site {
      color: #6c7086;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-del {
      background: transparent;
      border: none;
      color: #45475a;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .history-del:hover { color: #f38ba8; }

    .history-empty {
      text-align: center;
      color: #45475a;
      font-size: 13px;
      padding: 48px 20px;
      line-height: 1.7;
    }

    /* ═══════════════════════════════════════════
       설정 뷰
    ═══════════════════════════════════════════ */
    #settings-view {
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .settings-body::-webkit-scrollbar { width: 4px; }
    .settings-body::-webkit-scrollbar-track { background: transparent; }
    .settings-body::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-section-title {
      font-size: 11px;
      font-weight: 700;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .settings-label {
      font-size: 12px;
      color: #a6adc8;
      font-weight: 500;
    }

    .settings-input {
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-radius: 8px;
      color: #cdd6f4;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .settings-input:focus { border-color: #7c3aed; }
    .settings-input::placeholder { color: #45475a; }

    .settings-hint {
      font-size: 11px;
      color: #45475a;
      line-height: 1.5;
    }

    .settings-save-btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.15s;
      align-self: flex-start;
    }

    .settings-save-btn:hover { opacity: 0.85; }

    /* ═══════════════════════════════════════════
       헤더 아이콘 버튼 (새 채팅 / 대화 기록)
    ═══════════════════════════════════════════ */
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid #2d2f45;
      border-radius: 6px;
      color: #6c7086;
      font-size: 13px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: #2d2f45;
      color: #cdd6f4;
      border-color: #4c4f6b;
    }

    /* ═══════════════════════════════════════════
       대화 기록 드로어 (채팅 영역 위 오버레이)
    ═══════════════════════════════════════════ */
    .history-drawer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0f111a;
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .history-drawer.hidden { display: none; }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .drawer-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .drawer-close {
      background: transparent;
      border: none;
      color: #6c7086;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
      cursor: pointer;
    }

    .drawer-close:hover { color: #cdd6f4; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-track { background: transparent; }
    .session-list::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .session-item:hover { background: #1e2035; border-color: #2d2f45; }

    .session-item.active {
      background: rgba(139,92,246,0.12);
      border-color: rgba(139,92,246,0.3);
    }

    .session-title {
      font-size: 13px;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      font-size: 11px;
      color: #45475a;
    }

    .session-empty {
      text-align: center;
      color: #45475a;
      font-size: 13px;
      padding: 40px 20px;
      line-height: 1.7;
    }

    /* ── 채팅 컨트롤 바 ── */
    .chat-controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 4px 12px;
      border-bottom: 1px solid #2d2f45;
      flex-shrink: 0;
      gap: 8px;
    }
    .model-select-bottom {
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 8px;
      color: #cdd6f4;
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
      flex: 1;
      max-width: 160px;
    }
    .chat-ctrl-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ctrl-btn {
      background: transparent;
      border: none;
      color: #6c7086;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    .ctrl-btn:hover {
      background: #313244;
      color: #cdd6f4;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ 메인 채팅 패널 ═══════════════════ -->
  <div class="main-panel">

    <!-- 헤더 -->
    <header class="panel-header">
      <div class="header-brand">
        <!-- Aurora 로고 (커스텀 SVG) -->
        <svg class="aurora-logo-svg" viewBox="0 0 100 100" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ag-panel" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
          <path d="M20 80L50 20L80 80" stroke="url(#ag-panel)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M35 80L50 50L65 80" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
          <path d="M10 85C30 75 70 75 90 85" stroke="url(#ag-panel)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
        </svg>
        <span class="aurora-title">Aurora Chat</span>
      </div>

    </header>

    <!-- 채팅 영역 (JS로 말풍선 주입) -->
    <div class="chat-area" id="chat-area">
      <!-- 빈 상태 (JS에서 처음 AI 환영 메시지가 여기 들어감) -->
    </div>

    <!-- 대화 기록 드로어 (채팅 영역 위 오버레이) -->
    <div id="history-drawer" class="history-drawer hidden">
      <div class="drawer-header">
        <span class="drawer-title">대화 기록</span>
        <button class="drawer-close" id="close-drawer-btn" title="닫기">✕</button>
      </div>
      <ul id="session-list" class="session-list"></ul>
    </div>

    <!-- 하이라이트 히스토리 뷰 (JS에서 show/hide) -->
    <div id="history-view" style="display: none;">
      <div class="history-header">
        <div>
          <span class="history-title">저장된 하이라이트</span>
          <span class="history-count" id="history-count"></span>
        </div>
        <button class="clear-all-btn" id="clear-all-btn">전체 삭제</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

    <!-- 설정 뷰 (JS에서 show/hide) -->
    <div id="settings-view" style="display: none;">
      <div class="settings-header">
        <span class="settings-title">설정</span>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">API 키</div>

          <div class="settings-field">
            <label class="settings-label" for="settings-openai-key">OpenAI API Key</label>
            <input
              class="settings-input"
              type="password"
              id="settings-openai-key"
              placeholder="sk-..."
              autocomplete="off"
            />
            <span class="settings-hint">GPT-4o 등 OpenAI 모델 사용 시 필요합니다.</span>
          </div>

          <div class="settings-field">
            <label class="settings-label" for="settings-gemini-key">Gemini API Key</label>
            <input
              class="settings-input"
              type="password"
              id="settings-gemini-key"
              placeholder="AIza..."
              autocomplete="off"
            />
            <span class="settings-hint">Gemini 2.5 Flash 등 클라우드 Gemini 모델 사용 시 필요합니다.</span>
          </div>

          <button class="settings-save-btn" id="settings-save-btn">저장</button>
        </div>
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-footer" id="input-footer">
      <!-- AI 모델 선택 + 채팅 컨트롤 바 -->
      <div class="chat-controls-bar" id="chat-controls-bar">
        <select class="model-select-bottom" id="model-select-bottom">
          <option value="gemini-nano">⚡ Nano</option>
          <option value="gemma3:12b">🦙 Gemma3 12B</option>
          <option value="gemma3:4b">🦙 Gemma3 4B</option>
          <option value="gemini-2.5-flash">✨ Flash</option>
          <option value="gpt-4o">💬 GPT-4o</option>
        </select>
        <div class="chat-ctrl-right">
          <button class="ctrl-btn" id="new-chat-btn" title="새 채팅">✨</button>
          <button class="ctrl-btn" id="history-btn" title="챗 히스토리">🕒</button>
          <button class="ctrl-btn" id="sidebar-toggle-btn" title="사이드바 열기/닫기">
            <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg>
          </button>
        </div>
      </div>
      <label id="page-context-toggle">
        <input type="checkbox" id="use-page-context">
        📄 현재 페이지 컨텍스트 포함
      </label>
      <div class="input-row">
        <textarea
          id="user-input"
          placeholder="오로라에게 메시지 보내기..."
          rows="1"
        ></textarea>
        <button id="send-btn" title="전송">
          <!-- 전송 아이콘 -->
          <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
        </button>
      </div>
      <div class="input-hints">
        <span>Shift + Enter 로 줄바꿈</span>
        <span class="context-active" id="context-indicator">대기 중</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ 슬림 사이드바 ═══════════════════ -->
  <nav class="slim-sidebar">

    <!-- 상단 탭 버튼들 -->
    <div class="sidebar-top">
      <!-- 채팅 버튼 (활성 상태) -->
      <button class="sb-btn active" title="채팅" id="sb-chat">
        <!-- IconChat 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="20" width="60" height="45" rx="4" stroke="currentColor" stroke-width="6"/>
          <path d="M25 65L15 85L35 65" fill="currentColor"/>
          <rect x="35" y="40" width="50" height="40" rx="4" stroke="url(#ag-sb)" stroke-width="6"/>
          <defs>
            <linearGradient id="ag-sb" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
        </svg>
      </button>

      <!-- 히스토리 버튼 -->
      <button class="sb-btn" title="히스토리" id="sb-history">
        <!-- IconHistory 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15C30.67 15 15 30.67 15 50C15 69.33 30.67 85 50 85C69.33 85 85 69.33 85 50" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          <path d="M50 30V50L65 65" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 하단: 설정 버튼 -->
    <div class="sidebar-bottom">
      <div class="sidebar-sep"></div>
      <!-- 설정 버튼 -->
      <button class="sb-btn settings" title="설정" id="sb-settings">
        <!-- IconSettings 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 20L80 35V65L50 80L20 65V35L50 20Z" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
          <circle cx="50" cy="50" r="10" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </nav>

  <script type="module" src="./main.ts"></script>
</body>
</html>
