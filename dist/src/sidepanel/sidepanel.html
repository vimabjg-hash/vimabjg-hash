<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f111a;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
       메인 패널 (채팅 영역)
    ═══════════════════════════════════════════ */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1c2e;
      border-right: 1px solid #2d2f45;
    }

    /* ── 헤더 ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Aurora 로고 SVG */
    .aurora-logo-svg { flex-shrink: 0; }

    .aurora-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .model-select {
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 11px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
    }

    .model-select:hover { border-color: #4c4f6b; }

    /* ── 채팅 영역 ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 스크롤바 스타일 */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    /* ── 채팅 말풍선 ── */

    /* 사용자 말풍선 (오른쪽 정렬) */
    .bubble-user {
      display: flex;
      justify-content: flex-end;
    }

    .bubble-user .bubble-content {
      background: #2d2f45;
      color: #e2e8f0;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      max-width: 85%;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* AI 말풍선 (왼쪽 정렬) */
    .bubble-ai {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    /* AI 아바타 (퍼플→핑크 그라데이션 원형) */
    .ai-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }

    .bubble-ai .bubble-content {
      background: #141625;
      border: 1px solid #2d2f45;
      color: #d1d5db;
      border-radius: 4px 18px 18px 18px;
      padding: 12px 14px;
      max-width: calc(100% - 42px);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-word;
    }

    /* 컨텍스트 뱃지 (액션 종류 + 원문 미리보기) */
    .context-badge {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-left: 3px solid #8b5cf6;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .context-badge .badge-action {
      color: #a78bfa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .context-badge .badge-text {
      color: #6c7086;
      line-height: 1.5;
    }

    /* 로딩 점 애니메이션 */
    .loading-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8b5cf6;
      margin: 0 2px;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: #a855f7; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: #ec4899; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* 빈 상태 메시지 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      color: #45475a;
      text-align: center;
      flex: 1;
    }

    .empty-state svg { opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* 마크다운 스타일 (AI 결과에 적용) */
    .bubble-content ul,
    .bubble-content ol { padding-left: 1.4em; margin: 4px 0; }
    .bubble-content li { margin-bottom: 4px; }
    .bubble-content strong { color: #f5c2e7; }
    .bubble-content code {
      background: #313244; border-radius: 4px;
      padding: 1px 5px; font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    /* ── 입력 영역 (푸터) ── */
    .input-footer {
      padding: 12px 14px;
      border-top: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #0f111a;
      border: 1px solid #2d2f45;
      border-radius: 12px;
      padding: 8px 12px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: #7c3aed; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #cdd6f4;
      font-size: 13px;
      resize: none;
      outline: none;
      height: 36px;
      max-height: 120px;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #45475a; }

    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      padding: 7px 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #2d2f45; cursor: not-allowed; }

    .input-hints {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #45475a;
    }

    .context-active {
      color: #8b5cf6;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    /* ═══════════════════════════════════════════
       슬림 사이드바 (우측 60px)
    ═══════════════════════════════════════════ */
    .slim-sidebar {
      width: 56px;
      background: #0f111a;
      border-left: 1px solid #2d2f45;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      justify-content: space-between;
    }

    .sidebar-top,
    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
      padding: 0 6px;
    }

    .sidebar-sep {
      width: 32px;
      height: 1px;
      background: #2d2f45;
      margin: 8px 0;
    }

    /* 사이드바 버튼 */
    .sb-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .sb-btn:hover {
      background: #2d2f45;
      color: #cdd6f4;
    }

    .sb-btn.active {
      background: rgba(139,92,246,0.2);
      color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.3);
    }

    .sb-btn.settings:hover { transform: rotate(60deg); }

    /* ═══════════════════════════════════════════
       히스토리 뷰
    ═══════════════════════════════════════════ */
    #history-view {
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2f45;
      background: #141625;
      flex-shrink: 0;
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .history-count {
      font-size: 11px;
      color: #6c7086;
      margin-left: 6px;
    }

    .clear-all-btn {
      background: transparent;
      border: 1px solid #3d3f58;
      border-radius: 6px;
      color: #6c7086;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-all-btn:hover { border-color: #f38ba8; color: #f38ba8; }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #2d2f45; border-radius: 2px; }

    .history-card {
      background: #141625;
      border: 1px solid #2d2f45;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .history-card:hover { border-color: #4c4f6b; }

    .highlight-text {
      font-size: 13px;
      color: #cdd6f4;
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .history-date { color: #6c7086; flex-shrink: 0; }

    .history-site {
      color: #6c7086;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-del {
      background: transparent;
      border: none;
      color: #45475a;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .history-del:hover { color: #f38ba8; }

    .history-empty {
      text-align: center;
      color: #45475a;
      font-size: 13px;
      padding: 48px 20px;
      line-height: 1.7;
    }
  </style>
  <script type="module" crossorigin src="/assets/main--T7KuPKi.js"></script>
</head>
<body>

  <!-- ═══════════════════ 메인 채팅 패널 ═══════════════════ -->
  <div class="main-panel">

    <!-- 헤더 -->
    <header class="panel-header">
      <div class="header-brand">
        <!-- Aurora 로고 (커스텀 SVG) -->
        <svg class="aurora-logo-svg" viewBox="0 0 100 100" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ag-panel" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
          <path d="M20 80L50 20L80 80" stroke="url(#ag-panel)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M35 80L50 50L65 80" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
          <path d="M10 85C30 75 70 75 90 85" stroke="url(#ag-panel)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
        </svg>
        <span class="aurora-title">Aurora Chat</span>
      </div>

      <!-- 모델 선택 드롭다운 -->
      <select class="model-select">
        <option>Gemini Nano (Local)</option>
        <option>Gemini 2.5 Flash</option>
      </select>
    </header>

    <!-- 채팅 영역 (JS로 말풍선 주입) -->
    <div class="chat-area" id="chat-area">
      <!-- 빈 상태 (JS에서 처음 AI 환영 메시지가 여기 들어감) -->
    </div>

    <!-- 히스토리 뷰 (JS에서 show/hide) -->
    <div id="history-view" style="display: none;">
      <div class="history-header">
        <div>
          <span class="history-title">저장된 하이라이트</span>
          <span class="history-count" id="history-count"></span>
        </div>
        <button class="clear-all-btn" id="clear-all-btn">전체 삭제</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-footer" id="input-footer">
      <div class="input-row">
        <textarea
          id="user-input"
          placeholder="오로라에게 메시지 보내기..."
          rows="1"
        ></textarea>
        <button id="send-btn" title="전송">
          <!-- 전송 아이콘 -->
          <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
            <path d="M22 2L11 13"/>
            <path d="M22 2L15 22 11 13 2 9l20-7z"/>
          </svg>
        </button>
      </div>
      <div class="input-hints">
        <span>Shift + Enter 로 줄바꿈</span>
        <span class="context-active" id="context-indicator">대기 중</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ 슬림 사이드바 ═══════════════════ -->
  <nav class="slim-sidebar">

    <!-- 상단 탭 버튼들 -->
    <div class="sidebar-top">
      <!-- 채팅 버튼 (활성 상태) -->
      <button class="sb-btn active" title="채팅" id="sb-chat">
        <!-- IconChat 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="20" width="60" height="45" rx="4" stroke="currentColor" stroke-width="6"/>
          <path d="M25 65L15 85L35 65" fill="currentColor"/>
          <rect x="35" y="40" width="50" height="40" rx="4" stroke="url(#ag-sb)" stroke-width="6"/>
          <defs>
            <linearGradient id="ag-sb" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
        </svg>
      </button>

      <!-- 히스토리 버튼 -->
      <button class="sb-btn" title="히스토리" id="sb-history">
        <!-- IconHistory 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 15C30.67 15 15 30.67 15 50C15 69.33 30.67 85 50 85C69.33 85 85 69.33 85 50" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          <path d="M50 30V50L65 65" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 하단: 설정 버튼 -->
    <div class="sidebar-bottom">
      <div class="sidebar-sep"></div>
      <!-- 설정 버튼 -->
      <button class="sb-btn settings" title="설정" id="sb-settings">
        <!-- IconSettings 커스텀 SVG -->
        <svg viewBox="0 0 100 100" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 20L80 35V65L50 80L20 65V35L50 20Z" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
          <circle cx="50" cy="50" r="10" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </nav>

</body>
</html>
